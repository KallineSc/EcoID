<main>
    <section class="form-section">
        <div>
            <img src="/assets/svg/logo.png"/>
        </div>
       <h2>{{ title }}</h2>
       <ng-content></ng-content>
       <div class="btn-wrapper">
            <button 
                class="btn-primary" 
                (click)="submit()"
                [disabled]="disablePrimaryBtn"
            >
                {{ primaryBtnText }}
            </button>
            <div class="divider">
                {{ textDivider }}
                <button class="btn-secondary" (click)="navigate()">{{ secondaryBtnText }}</button>
            </div>            
       </div>
    </section>
</main>
